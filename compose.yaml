version: "3.5"

services:
  openc3-minio:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-enterprise-minio:${OPENC3_ENTERPRISE_TAG}"
    volumes:
      - "openc3-bucket-v:/data"
      - "./cacert.pem:/devel/cacert.pem:z"
    command: server --address ":9000" --console-address ":9001" /data
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MINIO_ROOT_USER: "${OPENC3_BUCKET_USERNAME}"
      MINIO_ROOT_PASSWORD: "${OPENC3_BUCKET_PASSWORD}"
      # Domain doesn't really matter but it's required. We really want the /minio path.
      # This is handled by our traefik configuration via rule: PathPrefix(`/minio`)
      # and forwarded on to the console at http://openc3-minio:9001
      MINIO_BROWSER_REDIRECT_URL: "http://openc3.com/minio"
      SSL_CERT_FILE: "/devel/cacert.pem"
      CURL_CA_BUNDLE: "/devel/cacert.pem"
      REQUESTS_CA_BUNDLE: "/devel/cacert.pem"
      NODE_EXTRA_CA_CERTS: "/devel/cacert.pem"

  openc3-redis:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-enterprise-redis:${OPENC3_ENTERPRISE_TAG}"
    volumes:
      - "openc3-redis-v:/data"
      - "./cacert.pem:/devel/cacert.pem:z"
      - "./openc3-enterprise-redis/users.acl:/config/users.acl:z"
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      SSL_CERT_FILE: "/devel/cacert.pem"
      CURL_CA_BUNDLE: "/devel/cacert.pem"
      REQUESTS_CA_BUNDLE: "/devel/cacert.pem"
      NODE_EXTRA_CA_CERTS: "/devel/cacert.pem"

  openc3-redis-ephemeral:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-enterprise-redis:${OPENC3_ENTERPRISE_TAG}"
    volumes:
      - "./cacert.pem:/devel/cacert.pem:z"
      - "./openc3-enterprise-redis/users.acl:/config/users.acl:z"
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    command: ["redis-server", "/config/redis_ephemeral.conf"]
    environment:
      SSL_CERT_FILE: "/devel/cacert.pem"
      CURL_CA_BUNDLE: "/devel/cacert.pem"
      REQUESTS_CA_BUNDLE: "/devel/cacert.pem"
      NODE_EXTRA_CA_CERTS: "/devel/cacert.pem"

  openc3-cosmos-cmd-tlm-api:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-cosmos-enterprise-cmd-tlm-api:${OPENC3_ENTERPRISE_TAG}"
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - "openc3-redis"
      - "openc3-redis-ephemeral"
      - "openc3-minio"
    volumes:
      - "openc3-gems-v:/gems"
      - "./plugins:/plugins:z"
      - "./cacert.pem:/devel/cacert.pem:z"
    environment:
      - "RAILS_ENV=production"
      - "GEM_HOME=/gems"
    group_add:
      - ${OPENC3_LOCAL_MODE_GROUP_ID}
    env_file:
      - ".env"

  openc3-cosmos-script-runner-api:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-cosmos-enterprise-script-runner-api:${OPENC3_ENTERPRISE_TAG}"
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - "openc3-redis"
      - "openc3-redis-ephemeral"
      - "openc3-minio"
    volumes:
      - "openc3-gems-v:/gems:ro"
      - "./plugins:/plugins:z"
      - "./cacert.pem:/devel/cacert.pem:z"
    environment:
      - "RAILS_ENV=production"
      - "GEM_HOME=/gems"
    group_add:
      - ${OPENC3_LOCAL_MODE_GROUP_ID}
    env_file:
      - ".env"

  openc3-operator:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-enterprise-operator:${OPENC3_ENTERPRISE_TAG}"
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - "openc3-redis"
      - "openc3-redis-ephemeral"
      - "openc3-minio"
    volumes:
      - "openc3-gems-v:/gems:ro"
      - "./plugins:/plugins:z"
      - "./cacert.pem:/devel/cacert.pem:z"
      # Add access to the entire C drive on Windows
      # - "/c:/c"
    environment:
      - "GEM_HOME=/gems"
    group_add:
      - ${OPENC3_LOCAL_MODE_GROUP_ID}
    env_file:
      - ".env"
    extra_hosts:
      - host.docker.internal:host-gateway
    command: ["ruby", "/openc3/lib/openc3/operators/microservice_operator.rb"]

  openc3-traefik:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-enterprise-traefik:${OPENC3_ENTERPRISE_TAG}"
    volumes:
      - "./cacert.pem:/devel/cacert.pem:z"
      - "./openc3-enterprise-traefik/traefik.yaml:/etc/traefik/traefik.yaml:z"
      # - "./openc3-enterprise-traefik/traefik-allow-http.yaml:/etc/traefik/traefik.yaml:z"
      # - "./openc3-enterprise-traefik/traefik-ssl.yaml:/etc/traefik/traefik.yaml:z"
      # - "./openc3-enterprise-traefik/traefik-letsencrypt.yaml:/etc/traefik/traefik.yaml:z"
      # - "./openc3-enterprise-traefik/cert.key:/etc/traefik/cert.key:z"
      # - "./openc3-enterprise-traefik/cert.crt:/etc/traefik/cert.crt:z"
    ports:
      - "127.0.0.1:2900:80"
      - "127.0.0.1:2943:443"
      # - "80:80"
      # - "443:443"
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - "openc3-redis"
      - "openc3-redis-ephemeral"
      - "openc3-minio"
    environment:
      SSL_CERT_FILE: "/devel/cacert.pem"
      CURL_CA_BUNDLE: "/devel/cacert.pem"
      REQUESTS_CA_BUNDLE: "/devel/cacert.pem"
      NODE_EXTRA_CA_CERTS: "/devel/cacert.pem"

  openc3-cosmos-init:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-cosmos-enterprise-init:${OPENC3_ENTERPRISE_TAG}"
    restart: on-failure
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - "openc3-traefik"
      - "openc3-redis"
      - "openc3-redis-ephemeral"
      - "openc3-minio"
    volumes:
      - "openc3-gems-v:/gems"
      - "./plugins:/plugins:z"
      - "./cacert.pem:/devel/cacert.pem:z"
    environment:
      - "GEM_HOME=/gems"
    group_add:
      - ${OPENC3_LOCAL_MODE_GROUP_ID}
    env_file:
      - ".env"

  openc3-postgresql:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-enterprise-postgresql:${OPENC3_ENTERPRISE_TAG}"
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak123
      - POSTGRES_DB=keycloak
    volumes:
      - "openc3-postgresql:/var/lib/postgresql/data"
      - "./cacert.pem:/devel/cacert.pem:z"

  openc3-keycloak:
    image: "${OPENC3_ENTERPRISE_REGISTRY}/${OPENC3_ENTERPRISE_NAMESPACE}/openc3-enterprise-keycloak:${OPENC3_ENTERPRISE_TAG}"
    restart: "unless-stopped"
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=2900
      # Use these settings when enabling SSL in keycloak
      # - KC_HOSTNAME=mydomain.com
      # - KC_HOSTNAME_PORT=-1
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - "./cacert.pem:/devel/cacert.pem:z"
    depends_on:
      - openc3-postgresql

volumes:
  openc3-redis-v: {}
  openc3-bucket-v: {}
  openc3-gems-v: {}
  openc3-postgresql: {}
